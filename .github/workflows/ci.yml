name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustfmt.toml uses nightly-only options, so this runs on nightly. Rolling
      # (unpinned): if a new nightly changes formatting this goes red — the
      # intended signal to re-run scripts/fmt.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy-test:
    name: clippy & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # A bare checkout is enough: the engine tests build game state in Rust, the
      # card tests load the committed plugins/{builtin,canon,testing}, and the
      # keyword-classification drift-guard skips when the mtg-rules skill is
      # absent. Nothing here reads the gitignored ~600 MB data/ dump.
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      # NOTE: `cargo xtask cite check` is intentionally not run yet — it shells
      # out to the mtg-rules skill and needs the CR snapshot under data/, neither
      # of which a clean runner has. Wiring it in (install the skill + fetch just
      # the rules snapshot) is a follow-up.
