# `cargo migrate <plugin_dir> [migration_number]` -- always a release build:
# parsing AllPrintings.json under the dev profile takes tens of seconds.
# `cargo card <plugin_dir> <card_name>` shows a card's parsed expansion.
[alias]
migrate = "run --release -p deckmaste_migrations --"
card = "run -p deckmaste_cards --"
# `cargo xtask <validate|migrate|card> ...` -- workspace automation, a pure
# dispatcher over the crates' CLI entry points. Always release for the same
# reason as `migrate`.
xtask = "run --release -p xtask --"
