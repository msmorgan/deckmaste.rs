# `large_enum_variant` fires at 200 bytes by default, which is noise for this
# grammar's value enums: `Selection`/`Count`/`PlayerAction` nest several layers
# unboxed by design (boxing is reserved for breaking size *cycles*, not for
# size alone — see `count.rs`/`filter.rs`). 320 is the bar we treat as
# "potentially significant" and worth a second look (raised from 256 at
# P0.W7 when the targeting-test atoms grew `Filter` and `Property`'s gap
# crossed 270).
enum-variant-size-threshold = 320
