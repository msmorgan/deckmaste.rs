# `large_enum_variant` fires at 200 bytes by default, which is noise for this
# grammar's value enums: `Selection`/`Count`/`PlayerAction` nest several layers
# unboxed by design (boxing is reserved for breaking size *cycles*, not for
# size alone — see `count.rs`/`filter.rs`). 256 is the bar we treat as
# "potentially significant" and worth a second look.
enum-variant-size-threshold = 256
